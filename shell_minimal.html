<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Smart Student Performance Analyzer</title>
    <style>
        body { font-family: monospace; background-color: #1e1e1e; color: #d4d4d4; margin: 20px; }
        #output {
            width: 100%; height: 400px; border: 1px solid #444;
            background-color: #000; color: #00ff00;
            padding: 10px; overflow-y: auto; white-space: pre-wrap;
        }
        #input-area { width: 100%; margin-top: 10px; display: flex; }
        #input-area span { padding-right: 10px; }
        #user-input {
            background: transparent; border: none; color: #fff;
            font-family: monospace; font-size: 16px; outline: none; flex-grow: 1;
        }
    </style>
</head>
<body>
    <h2>Smart Student Performance Analyzer</h2>
    <div id="output">Loading Analyzer...</div>
    <div id="input-area">
        <span>&gt;</span>
        <input type="text" id="user-input" autofocus placeholder="Type here and press Enter">
    </div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('output');
        var userInput = document.getElementById('user-input');

        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    statusElement.innerText += text + "\n";
                    statusElement.scrollTop = statusElement.scrollHeight;
                };
            })(),
            canvas: (function() { return null; })(), // No canvas needed for CLI
            setStatus: function(text) { console.log(text); },
            totalDependencies: 0,
            monitorRunDependencies: function(left) { this.totalDependencies = left; }
        };

        // Handle Input without popups
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = userInput.value + '\n';
                for (let i = 0; i < val.length; i++) {
                    // Send characters to Emscripten's stdin buffer
                    Module.stdinPush(val.charCodeAt(i));
                }
                Module.print("> " + userInput.value); // Echo input to terminal
                userInput.value = '';
            }
        });

        // Maintain focus on input
        document.addEventListener('click', () => userInput.focus());

        // Setup stdin buffer
        Module.stdinBuffer = [];
        Module.stdinPush = function(char) {
            Module.stdinBuffer.push(char);
        };
        
        // Emscripten library function to read from JS to C
        Module.preRun.push(function() {
            function stdin() {
                if (Module.stdinBuffer.length > 0) {
                    return Module.stdinBuffer.shift();
                }
                return null;
            }
            FS.init(stdin, null, null);
        });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
