<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>Smart Student Performance Analyzer</title>
    <style>
      body { font-family: monospace; background-color: #1a1a1a; color: #00ff00; padding: 20px; margin: 0; }
      #output { width: 100%; height: 80vh; background-color: #000; border: 1px solid #333; padding: 10px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 10px; }
      #input { width: 100%; background-color: #000; border: 1px solid #333; color: #00ff00; padding: 10px; font-family: monospace; font-size: 16px; outline: none; }
    </style>
  </head>
  <body>
    <h3>Smart Student Performance Analyzer (C + WASM)</h3>
    <div id="output"></div>
    <input type="text" id="input" placeholder="Type here and press Enter..." autofocus>

    <script type='text/javascript'>
      // Forcefully disable window.prompt to prevent any popups
      window.prompt = function() { return null; };

      var element = document.getElementById('output');
      var inputElement = document.getElementById('input');
      var stdinBuffer = [];

      var Module = {
        preRun: [],
        postRun: [],
        // Handle C's stdout (printf)
        print: (function() {
          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            element.innerHTML += text + "\n";
            element.scrollTop = element.scrollHeight;
          };
        })(),
        // Handle C's stdin (scanf/getchar)
        stdin: function() {
          if (stdinBuffer.length > 0) {
            return stdinBuffer.shift();
          }
          return null; // This combined with ASYNCIFY prevents popups
        },
        canvas: (function() { return null; })(),
        setStatus: function(text) { console.log(text); },
      };

      inputElement.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          const value = inputElement.value + "\n";
          Module.print("> " + inputElement.value);
          inputElement.value = "";
          // Push each character code into the buffer
          for (int i = 0; i < value.length; i++) {
            stdinBuffer.push(value.charCodeAt(i));
          }
        }
      });
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
